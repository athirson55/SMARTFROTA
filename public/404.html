<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Frota</title>
    <script>
      (function () {
        var path =
          window.location.pathname +
          window.location.search +
          window.location.hash;
        var target = "/SMARTFROTA/?p=" + encodeURIComponent(path);
        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
